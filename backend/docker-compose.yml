services:
  postgres:
    image: postgres:16
    container_name: neoai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: neoai_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d neoai_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  ai-module:
    build:
      context: ../ai_module
    container_name: neoai-ai-module
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:12345@postgres:5432/neoai_db
      CALLBACK_HOST_OVERRIDE: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8001:8000"

volumes:
  postgres_data:
